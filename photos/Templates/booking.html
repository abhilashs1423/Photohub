<!DOCTYPE html>
<html>
<head>
    <title>Book Photography Session</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:linear-gradient(rgba(0,0,0,.6),
            rgba(0,0,0,.6)),
            url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=1600');
            background-size:cover;
            background-position:center;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .booking-card{
            background:white;
            width:700px;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .btn-book{
            width:100%;
            padding:12px;
            font-size:20px;
        }

        .form-control{
            margin-bottom:15px;
        }
    </style>
</head>

<body>
{% if messages %}
    {% for message in messages %}
        <script>
            alert("{{ message }}");
        </script>
    {% endfor %}
{% endif %}

<div class="booking-card">

    <h1>📸 Book Your Shoot</h1>

    <form method="POST">

        {% csrf_token %}

        <label>Customer Name</label>
        {{ form.customer_name }}

        <label>Email</label>
        {{ form.email }}

        <label>Event Date</label>
        {{ form.event_date }}

        <label>Message</label>
        {{ form.message }}

        <br>

        <button type="submit"
                class="btn btn-warning btn-book">
            Book Now
        </button>

    </form>

</div>

</body>
</html>
