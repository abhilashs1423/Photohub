<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32');
background-size:cover;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
width:450px;
border-radius:20px;
box-shadow:0px 0px 20px rgba(0,0,0,.4);
}

</style>

</head>

<body>

<div class="login-box">

<h2 class="text-center mb-4">
📷 Login
</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<input type="text"
name="username"
class="form-control"
placeholder="Username"
required>
</div>

<div class="mb-3">
<input type="password"
name="password"
class="form-control"
placeholder="Password"
required>
</div>

<button class="btn btn-success w-100">
Login
</button>

</form>

<p class="text-center mt-3">

Don't have an account?

<a href="/register/">
Register
</a>

</p>

</div>

</body>
</html>
